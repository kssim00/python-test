<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코드:앤 파이썬 스튜디오</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --vscode-bg: #1e1e1e; --vscode-side: #252526; --vscode-accent: #007acc; --vscode-text: #cccccc; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: var(--vscode-text); font-family: 'Pretendard', sans-serif; }
        .app-wrapper { display: none; height: 100vh; width: 100vw; overflow: hidden; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--vscode-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #pw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .pw-box { background: #252526; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 300px; text-align: center; }

        .activity-bar { width: 50px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; flex-shrink: 0; }
        .explorer { width: 280px; background: var(--vscode-side); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; display: flex; min-width: 0; }
        .description-panel { width: 420px; padding: 25px; border-right: 1px solid #333; background: #1e1e1e; overflow-y: auto; flex-shrink: 0; }
        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        #editor-container { flex: 1; min-height: 0; }
        .console-area { height: 180px; background: #000; padding: 10px 15px; border-top: 1px solid #333; overflow-y: auto; }
        #output { color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 14px; line-height: 1.3; }
        .btn-run { position: absolute; right: 25px; top: 15px; z-index: 10; background: #28a745; color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .desc-section-title { font-weight: bold; color: #fff; margin: 25px 0 10px 0; font-size: 16px; border-left: 5px solid var(--vscode-accent); padding-left: 12px; }
        .desc-text { line-height: 1.8; color: #ccc; font-size: 14.5px; margin-bottom: 10px; }
        .example-box { background: #2d2d2d; border-radius: 8px; padding: 15px; border: 1px solid #444; color: #eee; font-family: 'Courier New', monospace; margin: 10px 0; }
        .example-label { color: #888; font-size: 11px; margin-bottom: 5px; font-family: 'Pretendard'; }
        .desc-table { width: 100%; border-collapse: collapse; margin: 15px 0; background-color: #252526; border: 1px solid #444; }
        .desc-table th, .desc-table td { border: 1px solid #444; padding: 8px; text-align: center; font-size: 13.5px; }
        .desc-table th { background-color: #333; color: #fff; font-weight: bold; }

        .main-cat-header { padding: 12px 15px; font-size: 12px; font-weight: bold; color: #fff; background: #37373d; cursor: pointer; border-bottom: 1px solid #222; position: relative; }
        .main-cat-header::after { content: '\f0da'; font-family: 'Font Awesome 5 Free'; position: absolute; right: 15px; transition: 0.3s; }
        .main-cat-header.open::after { transform: rotate(90deg); }
        
        .sub-cat-header { padding: 10px 15px 10px 30px; font-size: 12px; font-weight: bold; color: #999; background: #2d2d2d; cursor: pointer; border-bottom: 1px solid #222; position: relative; }
        .sub-cat-header::after { content: '\f0da'; font-family: 'Font Awesome 5 Free'; position: absolute; right: 15px; font-size: 10px; transition: 0.3s; }
        .sub-cat-header.open::after { transform: rotate(90deg); color: var(--vscode-accent); }

        .prob-item { padding: 8px 15px 8px 50px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #282828; }
        .prob-item.active { background: #37373d; color: white; border-left: 3px solid var(--vscode-accent); }
        .prob-item.solved { color: #28a745; font-weight: bold; }

        .floating-panel { display: none; position: fixed; top: 30px; left: 65px; right: 35px; bottom: 35px; background: #252526; border: 1px solid #444; border-radius: 12px; z-index: 1000; padding: 25px; overflow-y: auto; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .master-table { width: 100%; border-collapse: collapse; color: #ddd; font-size: 12px; }
        .master-table th, .master-table td { padding: 8px; border: 1px solid #444; text-align: center; }
        .btn-mini { padding: 6px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; color: white; margin: 0 2px; }
        .tab-btn { background: none; border: none; color: #888; cursor: pointer; font-weight: bold; font-size: 14px; padding: 10px; }
        .tab-btn.active { color: var(--vscode-accent); border-bottom: 2px solid var(--vscode-accent); }
        .admin-input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

<div id="loader" class="overlay"><div class="spinner"></div><b id="loader-msg">서버 데이터 동기화 중...</b></div>

<div id="pw-modal">
    <div class="pw-box">
        <h3 style="color:white; margin-top:0;">관리자 인증</h3>
        <input type="password" id="pw-input" class="admin-input" style="text-align:center; font-size:20px; letter-spacing: 5px;" onkeypress="if(event.keyCode==13) checkPw()">
    </div>
</div>

<div id="login-screen" class="overlay" style="display:none;">
    <div style="background:#252526; padding:40px; border-radius:15px; width:300px; text-align:center; border:1px solid #444;">
        <h2 style="color:white; margin-bottom:20px;">코드:앤 파이썬 스튜디오</h2>
        <input type="text" id="user-name" class="admin-input" style="text-align:center;" placeholder="학생 이름 입력" onkeypress="if(event.keyCode==13) login()">
        <button onclick="login()" style="width:100%; background:#007acc; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; margin-top:15px;">학습 시작</button>
    </div>
</div>

<div class="app-wrapper" id="main-app">
    <div class="activity-bar">
        <div style="text-align: center;"><i class="fas fa-code" style="color:white; font-size: 22px; margin-bottom: 25px;"></i><div id="user-display" style="font-size: 10px; color: #28a745; font-weight: bold; writing-mode: vertical-lr;">USER</div></div>
        <div>
            <div id="sync-icon" title="동기화 상태"><i class="fas fa-check-circle" style="color:#28a745; margin-bottom: 25px;"></i></div>
            <div onclick="askPw('dashboard')" title="성취도"><i class="fas fa-chart-line" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="askPw('setting')" title="문제 관리 마스터"><i class="fas fa-tasks" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="logout()" title="로그아웃"><i class="fas fa-sign-out-alt" style="color:#555; cursor:pointer;"></i></div>
        </div>
    </div>
    <div class="explorer">
        <div style="padding: 15px 20px; font-size: 11px; color: #888; font-weight: bold;">EXPLORER</div>
        <div id="accordion-root" style="flex: 1; overflow-y: auto;"></div>
        <div id="progress-stats" style="padding: 15px 20px; font-size: 12px; color: #28a745; border-top: 1px solid #333; font-weight:bold;">성취도: 0%</div>
    </div>
    <div class="main-content">
        <div class="description-panel">
            <h2 id="prob-title" style="margin: 0 0 20px 0; color: white;">문제를 선택하세요</h2>
            <div id="prob-desc-container"></div>
            <button id="hint-btn" style="background:#6e40aa; color:white; border:none; padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer; margin-top:20px; display:none;" onclick="showHint()"><i class="fas fa-lightbulb"></i> 힌트 보기</button>
        </div>
        <div class="editor-section">
            <button id="run-btn" class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
            <div id="editor-container"></div>
            <div class="console-area"><div id="output">코드를 실행하세요.</div></div>
        </div>
    </div>
</div>

<div id="admin-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2>문제 관리 마스터</h2><button onclick="closePanels()">닫기</button></div>
    <div class="admin-tab">
        <button id="tab-prob" class="tab-btn active" onclick="switchAdminTab('prob')">문제별 관리</button>
        <button id="tab-cat" class="tab-btn" onclick="switchAdminTab('cat')">카테고리별 관리</button>
    </div>
    <div id="admin-prob-view">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <button class="btn-mini" style="background:#555;" onclick="toggleAllChecks()">전체 선택/해제</button>
            <button class="btn-mini" style="background:#cc4125;" onclick="deleteSelected()">선택 삭제</button>
        </div>
        <div style="max-height:250px; overflow-y:auto; background:#111; padding:10px; border-radius:8px;">
            <table class="master-table">
                <thead><tr><th>선택</th><th>분류</th><th>제목</th><th>이동</th></tr></thead>
                <tbody id="sort-body"></tbody>
            </table>
        </div>
    </div>
    <div id="admin-cat-view" style="display:none;">
        <div style="max-height:250px; overflow-y:auto; background:#111; padding:10px; border-radius:8px;">
            <table class="master-table">
                <thead><tr><th>카테고리명</th><th>이동</th></tr></thead>
                <tbody id="cat-sort-body"></tbody>
            </table>
        </div>
    </div>
    <div style="margin-top:20px; border-top: 1px solid #444; padding-top: 20px;">
        <textarea id="json-io" class="admin-input" style="height:60px; font-family:monospace; font-size:11px;" placeholder="JSON 결과 창"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="exportJson()" style="flex:2; background:#007acc; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px;">현재 정렬상태 JSON 복사</button>
            <button onclick="resetDataAndSync()" style="flex:1; background:#cc4125; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px;">데이터 초기화 (재동기화)</button>
        </div>
    </div>
</div>

<div id="dashboard-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>학원 전체 진도 현황</h3><button onclick="closePanels()">닫기</button></div>
    <table class="master-table"><thead><tr style="background:#333;"><th>학생 이름</th><th>성취도</th><th>푼 문제</th></tr></thead><tbody id="stats-body"></tbody></table>
</div>

<script>
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbxECzN-NGJWsrx466aoGcodQICqQY2UeNVBJ4_CR8gyxi2TerpznaZAX7xCLw530Yk1/exec";
    const GITHUB_JSON_FILES = ["https://raw.githubusercontent.com/kssim00/python-test/refs/heads/main/cospro2(1-6).json"];
    const ADMIN_PW = "1234";

    let problems = [], solvedIds = [], currentIdx = -1;
    let currentUser = localStorage.getItem('coden_user_v73') || ""; 
    let openMainCats = [], openSubCats = [], targetMode = "";

    function smartFormat(text) {
        if (!text) return "";
        let html = "", isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim(); if (!t) return;
            if (t.startsWith('□') || /^(문제 설명|매개변수 설명|return 값 설명|예제|예시 설명)/.test(t)) {
                isExample = t.includes('예제');
                html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`;
            } else if (isExample) {
                html += `<div class="example-box"><div class="example-label">출력 결과</div>${t}</div>`;
            } else { html += `<div class="desc-text">${t}</div>`; }
        });
        return html;
    }

    async function initApp() {
        if(!currentUser) { document.getElementById('loader').style.display='none'; document.getElementById('login-screen').style.display='flex'; return; }
        try {
            let localSaved = localStorage.getItem('coden_probs_v73');
            if (localSaved && JSON.parse(localSaved).length > 0) {
                problems = JSON.parse(localSaved);
            } else {
                let combinedData = [];
                for(let url of GITHUB_JSON_FILES) {
                    try { const res = await fetch(url); combinedData = [...combinedData, ...(await res.json())]; } catch(e) {}
                }
                const sheetRes = await fetch(`${MASTER_CLOUD_URL}?action=getProblems`);
                const sheetData = await sheetRes.json();
                // [수정] 스프레드시트 데이터(sheetData)를 깃허브 데이터(combinedData)보다 앞에 둡니다.
                problems = [...sheetData, ...combinedData].map((p, i) => ({ id: 80000 + i, ...p }));
            }

            const sRes = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(currentUser)}`);
            solvedIds = (await sRes.json()).map(id => parseInt(id));

            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
            require(['vs/editor/editor.main'], async function() {
                editor = monaco.editor.create(document.getElementById('editor-container'), { value: "", language: 'python', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }});
                editor.onDidChangeModelContent(() => { if (currentIdx !== -1) localStorage.setItem(`draft_${currentUser}_${currentIdx}`, editor.getValue()); });
                pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" });
                document.getElementById('loader').style.display = 'none'; document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                
                // [수정] 로그인을 하면 모든 카테고리가 닫힌 상태로 시작합니다.
                let next = problems.find(p => !solvedIds.includes(p.id)) || problems[0];
                if(next) { loadProblem(next.id); }
                renderList();
            });
        } catch(e) { alert("연결 실패!"); location.reload(); }
    }

    function renderList() {
        const root = document.getElementById('accordion-root'); root.innerHTML = "";
        const tree = {};
        problems.forEach(p => { if(!tree[p.mainCat]) tree[p.mainCat] = {}; if(!tree[p.mainCat][p.subCat]) tree[p.mainCat][p.subCat] = []; tree[p.mainCat][p.subCat].push(p); });
        for(const m in tree) {
            const mOpen = openMainCats.includes(m);
            const mDiv = document.createElement('div'); mDiv.className=`main-cat-header ${mOpen?'open':''}`; mDiv.innerText=m;
            mDiv.onclick = () => { mOpen ? openMainCats = openMainCats.filter(x=>x!=m) : openMainCats.push(m); renderList(); };
            root.appendChild(mDiv);
            if(mOpen) {
                for(const s in tree[m]) {
                    const sOpen = openSubCats.includes(s);
                    const sDiv = document.createElement('div'); sDiv.className=`sub-cat-header ${sOpen?'open':''}`; sDiv.innerText=s;
                    sDiv.onclick = () => { sOpen ? openSubCats = openSubCats.filter(c=>c!=s) : openSubCats.push(s); renderList(); };
                    root.appendChild(sDiv);
                    if(sOpen) {
                        tree[m][s].forEach(p => {
                            let pDiv = document.createElement('div'); pDiv.className=`prob-item ${currentIdx==p.id?'active':''} ${solvedIds.includes(p.id)?'solved':''}`;
                            pDiv.innerText = (solvedIds.includes(p.id)?'✔ ':'') + p.title;
                            pDiv.onclick=()=>loadProblem(p.id); root.appendChild(pDiv);
                        });
                    }
                }
            }
        }
        document.getElementById('progress-stats').innerText = `성취도: ${problems.length?Math.floor((solvedIds.length/problems.length)*100):0}% (${solvedIds.length}/${problems.length})`;
    }

    function resetDataAndSync() { if(confirm("초기화하시겠습니까?")) { localStorage.removeItem('coden_probs_v73'); location.reload(); } }

    function renderSortManager() {
        const body = document.getElementById('sort-body'); body.innerHTML = "";
        problems.forEach((p, i) => {
            body.innerHTML += `<tr style='border-bottom:1px solid #333;'><td><input type="checkbox" class="prob-check" data-idx="${i}"></td><td style='color:#777;'>${p.subCat}</td><td style='text-align:left;'>${p.title}</td><td><button class='btn-mini' style='background:#555;' onclick='moveProb(${i},-1000)'>⤒</button><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},-1)'>▲</button><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},1)'>▼</button><button class='btn-mini' style='background:#555;' onclick='moveProb(${i},1000)'>⤓</button></td></tr>`;
        });
    }

    function toggleAllChecks() { const checks = document.querySelectorAll('.prob-check'); const allChecked = Array.from(checks).every(c => c.checked); checks.forEach(c => c.checked = !allChecked); }
    function deleteSelected() { const checks = document.querySelectorAll('.prob-check:checked'); if (checks.length === 0) return alert("선택하세요."); if (!confirm("삭제하시겠습니까?")) return; const indices = Array.from(checks).map(c => parseInt(c.dataset.idx)).sort((a,b) => b-a); indices.forEach(idx => problems.splice(idx, 1)); updateSortAll(); }
    function moveProb(idx, dir) { let target = (dir === -1000) ? 0 : (dir === 1000) ? problems.length - 1 : idx + dir; if (target < 0) target = 0; if (target >= problems.length) target = problems.length - 1; const item = problems.splice(idx, 1)[0]; problems.splice(target, 0, item); updateSortAll(); }
    function updateSortAll() { localStorage.setItem('coden_probs_v73', JSON.stringify(problems)); renderSortManager(); renderList(); }
    function switchAdminTab(type) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); if(type==='prob') { document.getElementById('tab-prob').classList.add('active'); document.getElementById('admin-prob-view').style.display='block'; document.getElementById('admin-cat-view').style.display='none'; renderSortManager(); } else { document.getElementById('tab-cat').classList.add('active'); document.getElementById('admin-prob-view').style.display='none'; document.getElementById('admin-cat-view').style.display='block'; renderCatSortManager(); } }
    function renderCatSortManager() { const body = document.getElementById('cat-sort-body'); body.innerHTML = ""; const subCats = [...new Set(problems.map(p => p.subCat))]; subCats.forEach((s, i) => { body.innerHTML += `<tr><td style='text-align:left;'>${s}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${s}", -1)'>▲</button><button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${s}", 1)'>▼</button></td></tr>`; }); }
    function moveCategory(catName, dir) { const subCats = [...new Set(problems.map(p => p.subCat))]; const cur = subCats.indexOf(catName); const tar = cur + dir; if(tar < 0 || tar >= subCats.length) return; subCats.splice(cur, 1); subCats.splice(tar, 0, catName); let newOrder = []; subCats.forEach(s => { newOrder = [...newOrder, ...problems.filter(p => p.subCat === s)]; }); problems = newOrder; updateSortAll(); renderCatSortManager(); }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormat(p.desc);
        editor.setValue(localStorage.getItem(`draft_${currentUser}_${id}`) || p.initial || "");
    }

    async function runCode() {
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").trim();
            if(res === p.expected.toString().trim()) {
                document.getElementById('output').innerHTML = res + "\n\n<b style='color: yellow;'>🎉 정답입니다! 잘했어요!</b>";
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else { document.getElementById('output').innerHTML = res + `\n\n<span style='color:#ff4d4d;'>❌ 오답 (결과 다름)</span>`; }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message.split('at pyodide')[0]; }
    }

    function askPw(mode) { targetMode = mode; document.getElementById('pw-modal').style.display='flex'; }
    function checkPw() { if(document.getElementById('pw-input').value === ADMIN_PW) { document.getElementById('pw-modal').style.display='none'; if(targetMode == 'dashboard') { document.getElementById('dashboard-panel').style.display='block'; showStats(); } else { document.getElementById('admin-panel').style.display='block'; renderSortManager(); } } else { alert("오류"); } }
    async function showStats() {
        const body = document.getElementById('stats-body'); body.innerHTML = "로드 중...";
        try {
            const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
            const data = await res.json();
            const stats = {};
            data.forEach(row => { if(!stats[row[1]]) stats[row[1]] = new Set(); stats[row[1]].add(row[2]); });
            body.innerHTML = "";
            Object.keys(stats).forEach(n => { const cnt = stats[n].size; body.innerHTML += `<tr><td>${n}</td><td>${Math.floor((cnt/problems.length)*100)}%</td><td>${cnt}개</td></tr>`; });
        } catch(e) { body.innerHTML = "데이터 없음"; }
    }
    function exportJson() { const cleanProbs = problems.map(({id, ...rest}) => rest); document.getElementById('json-io').value = JSON.stringify(cleanProbs, null, 2); alert("복사됨"); }
    function login() { const n = document.getElementById('user-name').value.trim(); if(n) { localStorage.setItem('coden_user_v73', n); location.reload(); } }
    function logout() { localStorage.removeItem('coden_user_v73'); location.reload(); }
    function closePanels() { document.querySelectorAll('.floating-panel').forEach(p=>p.style.display='none'); }
    function closePwModal() { document.getElementById('pw-modal').style.display = 'none'; }
    function showHint() { alert("💡 힌트: " + problems.find(p => p.id === currentIdx).hint); }

    initApp();
</script>
</body>
</html>
