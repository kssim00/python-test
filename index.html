<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CODE:N - 통합 관리 시스템 (Master v4.0)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --vscode-bg: #1e1e1e; --vscode-side: #252526; --vscode-accent: #007acc; --vscode-text: #cccccc; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: var(--vscode-text); font-family: 'Pretendard', sans-serif; }
        .app-wrapper { display: none; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* 공통 오버레이 및 모달 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--vscode-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #pw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .pw-box { background: #252526; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 300px; text-align: center; }

        /* 레이아웃 */
        .activity-bar { width: 50px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; flex-shrink: 0; }
        .explorer { width: 280px; background: var(--vscode-side); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; display: flex; min-width: 0; }
        .description-panel { width: 420px; padding: 25px; border-right: 1px solid #333; background: #1e1e1e; overflow-y: auto; flex-shrink: 0; }
        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        #editor-container { flex: 1; min-height: 0; }
        .console-area { height: 180px; background: #000; padding: 10px 15px; border-top: 1px solid #333; overflow-y: auto; }
        #output { color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 14px; line-height: 1.4; }
        .btn-run { position: absolute; right: 25px; top: 15px; z-index: 10; background: #28a745; color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* 디자인: 파란 바 + 회색 박스 */
        .desc-section-title { font-weight: bold; color: #fff; margin: 25px 0 10px 0; font-size: 16px; border-left: 5px solid var(--vscode-accent); padding-left: 12px; }
        .desc-text { line-height: 1.8; color: #ccc; font-size: 14.5px; margin-bottom: 10px; }
        .example-box { background: #2d2d2d; border-radius: 8px; padding: 15px; border: 1px solid #444; color: #eee; font-family: 'Courier New', monospace; margin: 10px 0; }
        .example-label { color: #888; font-size: 11px; margin-bottom: 5px; font-family: 'Pretendard'; }

        /* 아코디언 메뉴 */
        .main-cat-header { padding: 12px 15px; font-size: 12px; font-weight: bold; color: #fff; background: #37373d; cursor: pointer; border-bottom: 1px solid #222; }
        .sub-cat-header { padding: 10px 15px 10px 30px; font-size: 12px; color: #999; background: #2d2d2d; cursor: pointer; border-bottom: 1px solid #222; }
        .prob-item { padding: 8px 15px 8px 50px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #282828; }
        .prob-item.active { background: #37373d; color: white; border-left: 3px solid var(--vscode-accent); }
        .prob-item.solved { color: #28a745; font-weight: bold; }

        /* 관리자용 플로팅 패널 */
        .floating-panel { display: none; position: fixed; top: 30px; left: 65px; right: 35px; bottom: 35px; background: #252526; border: 1px solid #444; border-radius: 12px; z-index: 1000; padding: 25px; overflow-y: auto; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .admin-section { margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .admin-label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
        .admin-input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 8px; width: 100%; box-sizing: border-box; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
        
        /* 성취도 테이블 */
        .master-table { width: 100%; border-collapse: collapse; color: #ddd; font-size: 13px; }
        .master-table th, .master-table td { padding: 10px; border: 1px solid #444; text-align: center; }
        .btn-mini { padding: 4px 8px; border-radius: 3px; border: none; cursor: pointer; font-size: 11px; color: white; }
    </style>
</head>
<body>

<div id="loader" class="overlay"><div class="spinner"></div><b id="loader-msg">클라우드 데이터 로드 중...</b></div>

<!-- 관리자 비번 모달 -->
<div id="pw-modal">
    <div class="pw-box">
        <h3 style="color:white; margin-top:0;">관리자 인증</h3>
        <input type="password" id="pw-input" class="admin-input" style="text-align:center; font-size:20px;" onkeypress="if(event.keyCode==13) checkPw()">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="checkPw()" style="flex:1; background:#007acc; color:white; border:none; padding:10px; cursor:pointer; font-weight:bold; border-radius:4px;">확인</button>
            <button onclick="closePwModal()" style="flex:1; background:#444; color:white; border:none; padding:10px; cursor:pointer; border-radius:4px;">취소</button>
        </div>
    </div>
</div>

<div id="login-screen" class="overlay" style="display:none;">
    <div style="background:#252526; padding:40px; border-radius:15px; width:300px; text-align:center; border:1px solid #444;">
        <h2 style="color:white; margin-bottom:20px;">CODE:N STUDIO</h2>
        <input type="text" id="user-name" class="admin-input" style="text-align:center;" placeholder="학생 이름 입력" onkeypress="if(event.keyCode==13) login()">
        <button onclick="login()" style="width:100%; background:#007acc; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; margin-top:15px;">학습 시작</button>
    </div>
</div>

<div class="app-wrapper" id="main-app">
    <!-- 사이드바 -->
    <div class="activity-bar">
        <div style="text-align: center;"><i class="fas fa-code" style="color:white; font-size: 22px; margin-bottom: 25px;"></i><div id="user-display" style="font-size: 10px; color: #28a745; font-weight: bold; writing-mode: vertical-lr;">USER</div></div>
        <div>
            <div id="sync-icon" title="동기화 완료"><i class="fas fa-check-circle" style="color:#28a745; margin-bottom: 25px;"></i></div>
            <div onclick="askPw('dashboard')" title="성취도 대시보드"><i class="fas fa-chart-line" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="askPw('setting')" title="문제 관리 및 순서 변경"><i class="fas fa-tasks" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="logout()" title="로그아웃"><i class="fas fa-sign-out-alt" style="color:#555; cursor:pointer;"></i></div>
        </div>
    </div>

    <!-- 문제 탐색기 -->
    <div class="explorer">
        <div style="padding: 15px 20px; font-size: 11px; color: #888; font-weight: bold;">EXPLORER</div>
        <div id="accordion-root" style="flex: 1; overflow-y: auto;"></div>
        <div id="progress-stats" style="padding: 15px 20px; font-size: 12px; color: #28a745; border-top: 1px solid #333; font-weight:bold;">성취도: 0%</div>
    </div>

    <!-- 메인 에디터 -->
    <div class="main-content">
        <div class="description-panel">
            <h2 id="prob-title" style="margin: 0 0 20px 0; color: white;">문제를 선택하세요</h2>
            <div id="prob-desc-container"></div>
            <button id="hint-btn" style="background:#6e40aa; color:white; border:none; padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer; margin-top:20px; display:none;" onclick="showHint()"><i class="fas fa-lightbulb"></i> 힌트 보기</button>
        </div>
        <div class="editor-section">
            <button id="run-btn" class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
            <div id="editor-container"></div>
            <div class="console-area">
                <div id="output">코드를 실행하세요.</div>
            </div>
        </div>
    </div>
</div>

<!-- 대시보드 패널 -->
<div id="dashboard-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>학생 성취도 및 리포트</h3><button onclick="closePanels()">닫기</button></div>
    <table class="master-table">
        <thead><tr style="background:#333;"><th>이름</th><th>성취도</th><th>완료수</th><th>리포트</th><th>삭제</th></tr></thead>
        <tbody id="stats-body"></tbody>
    </table>
</div>

<!-- 문제 관리 패널 (통합 기능) -->
<div id="admin-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h2>마스터 관리 센터</h2><button onclick="closePanels()">닫기</button></div>
    
    <!-- 1. 한 문제 추가 -->
    <div class="admin-section">
        <b style="color:var(--vscode-accent); display:block; margin-bottom:10px;">✏️ 개별 문제 추가</b>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="text" id="add-m" class="admin-input" placeholder="대분류(COS PRO 2급)">
            <input type="text" id="add-s" class="admin-input" placeholder="소분류(1차)">
        </div>
        <input type="text" id="add-t" class="admin-input" placeholder="문제 제목">
        <textarea id="add-d" class="admin-input" style="height:60px;" placeholder="지문 입력..."></textarea>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="text" id="add-e" class="admin-input" placeholder="정답">
            <input type="text" id="add-h" class="admin-input" placeholder="힌트">
        </div>
        <button onclick="addProblemLocal()" style="width:100%; background:#007acc; color:white; border:none; padding:10px; cursor:pointer;">추가하기 (목록에 반영)</button>
    </div>

    <!-- 2. 순서 변경 -->
    <div class="admin-section">
        <b style="color:var(--vscode-accent); display:block; margin-bottom:10px;">↕️ 문제 순서 및 정렬 관리</b>
        <div style="max-height:200px; overflow-y:auto; background:#111; padding:10px; border-radius:4px;">
            <table id="sort-table" style="width:100%; font-size:11px; border-collapse:collapse;">
                <tbody id="sort-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 3. 일괄 관리 -->
    <div class="admin-section" style="border:none;">
        <b style="color:var(--vscode-accent); display:block; margin-bottom:10px;">📦 데이터 전체 백업 및 일괄 업로드</b>
        <textarea id="json-io" class="admin-input" style="height:80px; font-family:monospace;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="importJson()" style="flex:1; background:#28a745; color:white; border:none; padding:10px;">일괄 업로드</button>
            <button onclick="exportJson()" style="flex:1; background:#444; color:white; border:none; padding:10px;">전체 JSON 복사</button>
        </div>
    </div>
</div>

<script>
    // [설정] 배포 URL 입력
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbxECzN-NGJWsrx466aoGcodQICqQY2UeNVBJ4_CR8gyxi2TerpznaZAX7xCLw530Yk1/exec";
    const ADMIN_PW = "1234";

    let problems = [], solvedIds = [], currentIdx = -1;
    let currentUser = localStorage.getItem('coden_user_v40') || "";
    let openMainCats = [], openSubCats = [], targetMode = "";

    // [로직] 지문 스마트 렌더링 (원장님 선호 스타일)
    function smartFormat(text) {
        if (!text) return "";
        let html = "";
        let isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim();
            if (!t) return;
            if (t.startsWith('□') || /^(문제 설명|매개변수 설명|return 값 설명|예제|예시 설명)/.test(t)) {
                isExample = t.includes('예제');
                html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`;
            } else if (isExample) {
                html += `<div class="example-box"><div class="example-label">출력 결과</div>${t}</div>`;
            } else {
                html += `<div class="desc-text">${t}</div>`;
            }
        });
        return html;
    }

    async function initApp() {
        if(!currentUser) { document.getElementById('loader').style.display='none'; document.getElementById('login-screen').style.display='flex'; return; }
        try {
            const pRes = await fetch(`${MASTER_CLOUD_URL}?action=getProblems`);
            problems = (await pRes.json()).map((p, i) => ({ id: 9000 + i, ...p }));
            const sRes = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(currentUser)}`);
            solvedIds = (await sRes.json()).map(id => parseInt(id));
            
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
            require(['vs/editor/editor.main'], async function() {
                editor = monaco.editor.create(document.getElementById('editor-container'), { value: "", language: 'python', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }});
                pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" });
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                
                autoJump();
            });
        } catch(e) { alert("데이터 연결 실패!"); location.reload(); }
    }

    function autoJump() {
        const next = problems.find(p => !solvedIds.includes(p.id)) || problems[0];
        if(next) { openMainCats=[next.mainCat]; openSubCats=[next.subCat]; loadProblem(next.id); }
        renderList();
    }

    function renderList() {
        const root = document.getElementById('accordion-root'); root.innerHTML = "";
        const tree = {};
        problems.forEach(p => {
            if(!tree[p.mainCat]) tree[p.mainCat] = {};
            if(!tree[p.mainCat][p.subCat]) tree[p.mainCat][p.subCat] = [];
            tree[p.mainCat][p.subCat].push(p);
        });
        for(const m in tree) {
            let mDiv = document.createElement('div'); mDiv.className=`main-cat-header`; mDiv.innerText=m;
            mDiv.onclick=()=>{ openMainCats.includes(m)?openMainCats=openMainCats.filter(x=>x!=m):openMainCats.push(m); renderList(); };
            root.appendChild(mDiv);
            if(openMainCats.includes(m)) {
                for(const s in tree[m]) {
                    let sDiv = document.createElement('div'); sDiv.className=`sub-cat-header`; sDiv.innerText=s;
                    sDiv.onclick=()=>{ openSubCats.includes(s)?openSubCats=openSubCats.filter(x=>x!=s):openSubCats.push(s); renderList(); };
                    root.appendChild(sDiv);
                    if(openSubCats.includes(s)) {
                        tree[m][s].forEach(p => {
                            let pDiv = document.createElement('div'); pDiv.className=`prob-item ${currentIdx==p.id?'active':''} ${solvedIds.includes(p.id)?'solved':''}`;
                            pDiv.innerText = (solvedIds.includes(p.id)?'✔ ':'') + p.title;
                            pDiv.onclick=()=>loadProblem(p.id);
                            root.appendChild(pDiv);
                        });
                    }
                }
            }
        }
        document.getElementById('progress-stats').innerText = `성취도: ${problems.length?Math.floor((solvedIds.length/problems.length)*100):0}% (${solvedIds.length}/${problems.length})`;
    }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormat(p.desc);
        document.getElementById('hint-btn').style.display = p.hint ? 'block' : 'none';
        editor.setValue(p.initial || "");
    }

    async function runCode() {
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").trim();
            const exp = p.expected.toString().trim();
            document.getElementById('output').innerText = res;
            if(res === exp) {
                document.getElementById('output').innerHTML += "\n<b style='color: yellow;'>🎉 정답! 기록 중...</b>";
                const r = await fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(await r.text() == "SUCCESS") {
                    document.getElementById('output').innerHTML += " [기록 완료]";
                    if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                }
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else { document.getElementById('output').innerHTML += `\n<span style='color:#ff4d4d;'>❌ 오답 (결과 다름)</span>`; }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message.split('at pyodide')[0]; }
    }

    // [관리자] 리포트 생성
    async function generateReport(name) {
        const res = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(name)}`);
        const userSolved = await res.json();
        const percent = Math.floor((userSolved.length / problems.length) * 100) || 0;
        let html = `<html><head><title>${name} 성취도 리포트</title><style>body{font-family:sans-serif;padding:40px;} .bar{background:#eee;height:20px;border-radius:10px;overflow:hidden;margin:20px 0;} .fill{background:#28a745;height:100%;width:${percent}%;}</style></head><body>`;
        html += `<h1>${name} 학생 학습 리포트</h1><div class='bar'><div class='fill'></div></div><h3>종합 성취도: ${percent}% (${userSolved.length}/${problems.length})</h3><ul>`;
        problems.forEach(p => { html += `<li>${userSolved.includes(p.id) || userSolved.includes(String(p.id)) ?'●':'○'} ${p.mainCat} > ${p.subCat} > ${p.title}</li>`; });
        html += `</ul><button onclick='window.print()'>인쇄하기</button></body></html>`;
        const win = window.open('', '_blank'); win.document.write(html); win.document.close();
    }

    // [관리자] 순서 관리 렌더링
    function renderSortManager() {
        const body = document.getElementById('sort-body'); body.innerHTML = "";
        problems.forEach((p, i) => {
            body.innerHTML += `<tr style='border-bottom:1px solid #222;'>
                <td style='padding:5px; text-align:left;'>${p.mainCat} > ${p.title}</td>
                <td style='width:60px;'>
                    <button class='btn-mini' style='background:#444;' onclick='moveItem(${i}, -1)'>▲</button>
                    <button class='btn-mini' style='background:#444;' onclick='moveItem(${i}, 1)'>▼</button>
                </td>
            </tr>`;
        });
    }
    function moveItem(idx, dir) {
        let target = idx + dir;
        if(target < 0 || target >= problems.length) return;
        let temp = problems[idx];
        problems[idx] = problems[target];
        problems[target] = temp;
        renderSortManager();
        renderList();
    }

    function addProblemLocal() {
        const p = {
            id: Date.now(),
            mainCat: document.getElementById('add-m').value,
            subCat: document.getElementById('add-s').value,
            title: document.getElementById('add-t').value,
            desc: document.getElementById('add-d').value,
            expected: document.getElementById('add-e').value,
            hint: document.getElementById('add-h').value,
            initial: document.getElementById('add-initial').value
        };
        problems.push(p);
        renderSortManager(); renderList();
        alert("목록에 추가되었습니다. 영구 저장을 위해 [전체 JSON 복사] 후 시트에 업데이트 하세요.");
    }

    function askPw(mode) { targetMode = mode; document.getElementById('pw-modal').style.display='flex'; }
    function checkPw() {
        if(document.getElementById('pw-input').value === ADMIN_PW) {
            document.getElementById('pw-modal').style.display='none';
            if(targetMode == 'dashboard') { document.getElementById('dashboard-panel').style.display='block'; showStats(); }
            else { document.getElementById('admin-panel').style.display='block'; renderSortManager(); }
        } else { alert("비번 오류"); }
    }
    async function showStats() {
        const body = document.getElementById('stats-body'); body.innerHTML = "로드 중...";
        const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
        const data = await res.json();
        const stats = {};
        data.forEach(row => { if(!stats[row[1]]) stats[row[1]] = new Set(); stats[row[1]].add(row[2]); });
        body.innerHTML = "";
        Object.keys(stats).forEach(n => {
            const cnt = stats[n].size;
            body.innerHTML += `<tr><td>${n}</td><td>${Math.floor((cnt/problems.length)*100)}%</td><td>${cnt}개</td><td><button onclick="generateReport('${n}')">📄</button></td><td><button onclick="alert('시트에서 직접 삭제하세요.')">❌</button></td></tr>`;
        });
    }

    function exportJson() { document.getElementById('json-io').value = JSON.stringify(problems, null, 2); alert("JSON이 생성되었습니다. 복사해서 보관하세요."); }
    function importJson() { try { problems = JSON.parse(document.getElementById('json-io').value); renderList(); renderSortManager(); alert("성공!"); } catch(e){alert("오류!");} }
    function closePanels() { document.querySelectorAll('.floating-panel').forEach(p=>p.style.display='none'); }
    function login() { const n = document.getElementById('user-name').value.trim(); if(n) { localStorage.setItem('coden_user_v40', n); location.reload(); } }
    function logout() { localStorage.removeItem('coden_user_v40'); location.reload(); }

    initApp();
</script>
</body>
</html>
