<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코드:앤 파이썬 스튜디오 (v8.1)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --vscode-bg: #1e1e1e; --vscode-side: #252526; --vscode-accent: #007acc; --vscode-text: #cccccc; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: var(--vscode-text); font-family: 'Pretendard', sans-serif; }
        .app-wrapper { display: none; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* 얇은 스크롤바 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--vscode-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* [수정] 관리자 인증 모달 - 버튼 제거 */
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #252526; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 320px; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,1); }

        .activity-bar { width: 50px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; flex-shrink: 0; }
        .explorer { width: 280px; background: var(--vscode-side); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        .description-panel { width: 400px; min-width: 150px; padding: 25px; border-right: 1px solid #333; background: #1e1e1e; overflow-y: auto; flex-shrink: 0; box-sizing: border-box; }
        
        /* 리사이저 스타일 강화 */
        .resizer-h { width: 8px; cursor: col-resize; background: transparent; z-index: 50; margin: 0 -4px; }
        .resizer-h:hover { background: rgba(0, 122, 204, 0.4); }

        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 200px; position: relative; overflow: hidden; }
        #editor-container { flex: 1; width: 100%; }
        
        .resizer-v { height: 10px; cursor: row-resize; background: transparent; z-index: 60; margin: -5px 0; }
        .resizer-v:hover { background: rgba(0, 122, 204, 0.4); }

        .console-area { height: 200px; min-height: 35px; background: #000; padding: 8px 15px; border-top: 1px solid #333; overflow-y: auto; flex-shrink: 0; }
        #output { color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 14px; line-height: 1.3; margin-top: 5px; }
        
        .btn-run { position: absolute; right: 25px; top: 15px; z-index: 100; background: #28a745; color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .desc-section-title { font-weight: bold; color: #fff; margin: 25px 0 10px 0; font-size: 16px; border-left: 5px solid var(--vscode-accent); padding-left: 12px; }
        .desc-text { line-height: 1.8; color: #ccc; font-size: 14.5px; margin-bottom: 10px; white-space: pre-wrap; }
        .example-box { background: #2d2d2d; border-radius: 8px; padding: 15px; border: 1px solid #444; color: #eee; font-family: 'Courier New', monospace; margin: 10px 0; }

        .desc-table { width: 100%; border-collapse: collapse; margin: 10px 0; background-color: #252526; border: 1px solid #444; }
        .desc-table th, .desc-table td { border: 1px solid #444; padding: 8px; text-align: center; }
        .desc-table th { background-color: #333; color: #fff; font-weight: bold; font-size: 13px; }

        .main-cat-header { padding: 12px 15px; font-size: 12px; font-weight: bold; color: #fff; background: #37373d; cursor: pointer; border-bottom: 1px solid #222; }
        .sub-cat-header { padding: 10px 15px 10px 30px; font-size: 12px; font-weight: bold; color: #999; background: #2d2d2d; cursor: pointer; border-bottom: 1px solid #222; }
        .prob-item { padding: 8px 15px 8px 50px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #282828; }
        .prob-item.solved { color: #28a745; font-weight: bold; }

        .floating-panel { display: none; position: fixed; top: 20px; left: 60px; right: 20px; bottom: 20px; background: #252526; border: 1px solid #444; border-radius: 12px; z-index: 1000; padding: 25px; overflow: hidden; }
        .admin-flex { display: flex; gap: 20px; height: calc(100% - 60px); }
        .admin-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #111; padding: 15px; border-radius: 8px; }
        .master-table { width: 100%; border-collapse: collapse; color: #ddd; font-size: 12px; }
        .master-table th, .master-table td { padding: 6px; border: 1px solid #333; text-align: center; }
        .btn-mini { padding: 4px 6px; border-radius: 3px; border: none; cursor: pointer; font-size: 10px; color: white; margin: 0 2px; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; font-weight: bold; font-size: 13px; padding-bottom: 8px; margin-right: 10px; }
        .tab-btn.active { color: var(--vscode-accent); border-bottom: 2px solid var(--vscode-accent); }
        .admin-input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body onselectstart="return !isDragging">

<div id="loader" class="overlay"><div class="spinner"></div><b id="loader-msg">데이터 동기화 중... (v8.1)</b></div>

<!-- [수정] 버튼 없는 비밀번호 모달 -->
<div id="pw-modal" class="custom-modal" onclick="if(event.target == this) closePanels()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 id="modal-title" style="color:white; margin-top:0;">관리자 인증</h3>
        <div id="pw-input-area">
            <input type="password" id="pw-input" class="admin-input" style="text-align:center; font-size:20px; letter-spacing:5px;" placeholder="····" onkeypress="if(event.keyCode==13) checkPw()">
        </div>
        <div id="hint-content-area" style="display:none; color:#eee; line-height:1.6; font-size:14px; text-align:left; margin-bottom:20px;"></div>
        <p id="modal-sub-msg" style="color:#666; font-size:11px; margin-top:10px;">비밀번호 입력 후 Enter를 누르세요.</p>
    </div>
</div>

<div id="login-screen" class="overlay" style="display:none;">
    <div style="background:#252526; padding:40px; border-radius:15px; width:300px; text-align:center; border:1px solid #444;">
        <h2 style="color:white; margin-bottom:20px;">코드:앤 파이썬 스튜디오</h2>
        <input type="text" id="user-name" class="admin-input" style="text-align:center;" placeholder="학생 이름 입력" onkeypress="if(event.keyCode==13) login()">
        <button onclick="login()" style="width:100%; background:#007acc; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; margin-top:15px;">학습 시작</button>
    </div>
</div>

<div class="app-wrapper" id="main-app">
    <div class="activity-bar">
        <div style="text-align: center;"><i class="fas fa-code" style="color:white; font-size: 22px; margin-bottom: 25px;"></i><div id="user-display" style="font-size: 10px; color: #28a745; font-weight: bold; writing-mode: vertical-lr;">USER</div></div>
        <div>
            <div id="sync-icon" title="클라우드 동기화 완료"><i class="fas fa-check-circle" style="color:#28a745; margin-bottom: 25px;"></i></div>
            <div onclick="askPw('dashboard')" title="성취도 리포트"><i class="fas fa-chart-line" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="askPw('setting')" title="문제 관리 및 정렬"><i class="fas fa-tasks" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="logout()" title="로그아웃"><i class="fas fa-sign-out-alt" style="color:#555; cursor:pointer;"></i></div>
        </div>
    </div>
    <div class="explorer">
        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 11px; color: #888; font-weight: bold;">EXPLORER</div>
            <button onclick="location.reload()" style="background:none;border:none;color:#666;cursor:pointer;font-size:10px;"><i class="fas fa-sync-alt"></i> 새로고침</button>
        </div>
        <div id="accordion-root" style="flex: 1; overflow-y: auto;"></div>
        <div id="progress-stats" style="padding: 15px 20px; font-size: 12px; color: #28a745; border-top: 1px solid #333; font-weight:bold;">성취도: 0%</div>
    </div>
    <div class="main-content">
        <div class="description-panel" id="panel-desc">
            <h2 id="prob-title" style="margin: 0 0 20px 0; color: white;">문제를 선택하세요</h2>
            <div id="prob-desc-container"></div>
            <button id="hint-btn" style="background:#6e40aa; color:white; border:none; padding:8px 15px; border-radius:4px; font-size:12px; cursor:pointer; margin-top:25px; display:none;" onclick="showHint()"><i class="fas fa-lightbulb"></i> 힌트 보기</button>
        </div>
        <div class="resizer-h" id="resizer-h"></div>
        <div class="editor-section">
            <button id="run-btn" class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
            <div id="editor-container"></div>
            <div class="resizer-v" id="resizer-v"></div>
            <div class="console-area" id="panel-terminal">
                <div style="color: #666; font-size: 10px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 3px;">TERMINAL</div>
                <div id="output">코드를 실행하세요.</div>
            </div>
        </div>
    </div>
</div>

<!-- 관리자 패널 -->
<div id="admin-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h2>마스터 센터</h2><button onclick="closePanels()">닫기</button></div>
    <div class="admin-flex">
        <div class="admin-col">
            <div class="admin-tab">
                <button id="tab-prob" class="tab-btn active" onclick="switchAdminTab('prob')">문제별 순서</button>
                <button id="tab-cat" class="tab-btn" onclick="switchAdminTab('cat')">카테고리 이동</button>
            </div>
            <div id="admin-prob-view" style="flex:1; overflow-y:auto;">
                <div style="margin-bottom:10px;"><button class="btn-mini" style="background:#555;" onclick="toggleAllChecks()">전체선택</button> <button class="btn-mini" style="background:#cc4125;" onclick="deleteSelected()">선택삭제</button></div>
                <table class="master-table"><thead><tr><th>체크</th><th>분류</th><th>제목</th><th>이동</th></tr></thead><tbody id="sort-body"></tbody></table>
            </div>
            <div id="admin-cat-view" style="display:none; flex:1; overflow-y:auto;">
                <table class="master-table"><thead><tr><th>카테고리</th><th>이동</th></tr></thead><tbody id="cat-sort-body"></tbody></table>
            </div>
        </div>
        <div class="admin-col" style="flex:0.6; background:transparent;">
            <b style="color:#ffcc00; font-size:13px;">📦 JSON 테스트</b>
            <textarea id="test-json-input" class="admin-input" style="height:120px; font-size:11px;" placeholder="JSON을 넣으세요"></textarea>
            <button onclick="applyTestJson()" style="width:100%; background:#28a745; color:white; border:none; padding:10px; cursor:pointer; font-weight:bold;">테스트 적용</button>
            <button onclick="exportJson()" style="width:100%; background:#444; color:white; border:none; padding:10px; margin-top:10px;">데이터 복사</button>
            <button onclick="resetDataAndSync()" style="width:100%; background:#8b0000; color:white; border:none; padding:10px; margin-top:20px;">서버 재동기화</button>
        </div>
    </div>
</div>

<div id="dashboard-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>학생 성취도 및 리포트</h3><button onclick="closePanels()">닫기</button></div>
    <table class="master-table"><thead><tr style="background:#333;"><th>학생 이름</th><th>성취도</th><th>완료수</th><th>리포트</th></tr></thead><tbody id="stats-body"></tbody></table>
</div>

<script>
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbxECzN-NGJWsrx466aoGcodQICqQY2UeNVBJ4_CR8gyxi2TerpznaZAX7xCLw530Yk1/exec";
    const GITHUB_USER = "kssim00", GITHUB_REPO = "python-test";
    const ADMIN_PW = "1234";

    let problems = [], solvedIds = [], currentIdx = -1, pyodide, editor, isDragging = false;
    let currentUser = localStorage.getItem('coden_user_v81') || ""; 
    let openMainCats = [], openSubCats = [], targetMode = "";

    function smartFormat(text) {
        if (!text) return "";
        let html = "", isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim(); if (!t) return;
            if (t.startsWith('□') || /^(문제 설명|매개변수 설명|return 값 설명|예제|예시 설명)/.test(t)) {
                isExample = t.includes('예제');
                html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`;
            } else if (isExample) {
                html += `<div class="example-box">${t}</div>`;
            } else { html += `<div class="desc-text">${t}</div>`; }
        });
        return html;
    }

    async function initApp() {
        if(!currentUser) { document.getElementById('loader').style.display='none'; document.getElementById('login-screen').style.display='flex'; return; }
        try {
            let localSaved = localStorage.getItem('coden_probs_v81');
            if (localSaved) { problems = JSON.parse(localSaved); } 
            else {
                const filesRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                const files = await filesRes.json();
                const jsonUrls = files.filter(f => f.name.endsWith('.json')).map(f => f.download_url);
                let combined = [];
                for(let url of jsonUrls) { combined = [...combined, ...(await (await fetch(url)).json())]; }
                const sheetRes = await fetch(`${MASTER_CLOUD_URL}?action=getProblems`);
                problems = [...(await sheetRes.json()), ...combined].map((p, i) => ({ id: 80000 + i, ...p }));
            }
            const sRes = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(currentUser)}`);
            solvedIds = (await sRes.json()).map(id => parseInt(id));

            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
            require(['vs/editor/editor.main'], async function() {
                editor = monaco.editor.create(document.getElementById('editor-container'), { value: "", language: 'python', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }});
                editor.onDidChangeModelContent(() => { if (currentIdx !== -1) localStorage.setItem(`draft_${currentUser}_${currentIdx}`, editor.getValue()); });
                pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" });
                document.getElementById('loader').style.display = 'none'; document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                renderList(); initResizing();
            });
        } catch(e) { alert("연결 실패!"); }
    }

    function initResizing() {
        const h = document.getElementById('resizer-h'), v = document.getElementById('resizer-v'), pD = document.getElementById('panel-desc'), pT = document.getElementById('panel-terminal');
        h.onmousedown = (e) => { 
            isDragging = true; 
            const startX = e.clientX, startW = pD.offsetWidth;
            const onMouseMove = (e) => {
                let w = startW + (e.clientX - startX);
                if (w > 150 && w < window.innerWidth-400) { pD.style.width = w+"px"; editor.layout(); }
            };
            const onMouseUp = () => { isDragging = false; window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); };
            window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
        };
        v.onmousedown = (e) => { 
            isDragging = true; 
            const startY = e.clientY, startH = pT.offsetHeight;
            const onMouseMove = (e) => {
                let h = startH + (startY - e.clientY);
                if (h > 35 && h < window.innerHeight-150) { pT.style.height = h+"px"; editor.layout(); }
            };
            const onMouseUp = () => { isDragging = false; window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); };
            window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
        };
    }

    function renderList() {
        const root = document.getElementById('accordion-root'); root.innerHTML = "";
        const tree = {};
        problems.forEach(p => { if(!tree[p.mainCat]) tree[p.mainCat] = {}; if(!tree[p.mainCat][p.subCat]) tree[p.mainCat][p.subCat] = []; tree[p.mainCat][p.subCat].push(p); });
        for(const m in tree) {
            let mDiv = document.createElement('div'); mDiv.className=`main-cat-header`; mDiv.innerText=m;
            mDiv.onclick=()=>{ openMainCats.includes(m)?openMainCats=openMainCats.filter(x=>x!=m):openMainCats.push(m); renderList(); };
            root.appendChild(mDiv);
            if(openMainCats.includes(m)) {
                for(const s in tree[m]) {
                    let sDiv = document.createElement('div'); sDiv.className=`sub-cat-header`; sDiv.innerText=s;
                    sDiv.onclick=()=>{ openSubCats.includes(s)?openSubCats=openSubCats.filter(x=>x!=s):openSubCats.push(s); renderList(); };
                    root.appendChild(sDiv);
                    if(openSubCats.includes(s)) {
                        tree[m][s].forEach(p => {
                            let pDiv = document.createElement('div'); pDiv.className=`prob-item ${currentIdx==p.id?'active':''} ${solvedIds.includes(p.id)?'solved':''}`;
                            pDiv.innerText = (solvedIds.includes(p.id)?'✔ ':'') + p.title; pDiv.onclick=()=>loadProblem(p.id); root.appendChild(pDiv);
                        });
                    }
                }
            }
        }
        document.getElementById('progress-stats').innerText = `성취도: ${problems.length?Math.floor((solvedIds.length/problems.length)*100):0}% (${solvedIds.length}/${problems.length})`;
    }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('output').innerText = "코드를 실행하세요.";
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormat(p.desc);
        document.getElementById('hint-btn').style.display = (p.hint && p.hint.trim() !== "") ? 'block' : 'none';
        editor.setValue(localStorage.getItem(`draft_${currentUser}_${id}`) || p.initial || "");
    }

    async function runCode() {
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").trim();
            if(res === p.expected.toString().trim()) {
                document.getElementById('output').innerHTML = res + "\n\n<b style='color: yellow;'>🎉 정답입니다! 잘했어요!</b>";
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else { document.getElementById('output').innerHTML = res + `\n\n<span style='color:#ff4d4d;'>❌ 오답 (결과 다름)</span>`; }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message.split('at pyodide')[0]; }
    }

    function showHint() {
        const p = problems.find(x => x.id === currentIdx);
        document.getElementById('modal-title').innerText = "💡 학습 힌트";
        document.getElementById('pw-input-area').style.display = "none";
        document.getElementById('modal-sub-msg').style.display = "none";
        document.getElementById('hint-content-area').style.display = "block";
        document.getElementById('hint-content-area').innerText = p.hint;
        document.getElementById('pw-modal').style.display = "flex";
    }

    function askPw(mode) {
        targetMode = mode;
        document.getElementById('modal-title').innerText = "관리자 인증";
        document.getElementById('pw-input-area').style.display = "block";
        document.getElementById('modal-sub-msg').style.display = "block";
        document.getElementById('hint-content-area').style.display = "none";
        document.getElementById('pw-input').value = "";
        document.getElementById('pw-modal').style.display = 'flex';
        document.getElementById('pw-input').focus();
    }

    function checkPw() {
        const i = document.getElementById('pw-input');
        if(i.value === ADMIN_PW) {
            i.value = ""; closePanels();
            if(targetMode == 'dashboard') { document.getElementById('dashboard-panel').style.display='block'; showStats(); }
            else { document.getElementById('admin-panel').style.display='block'; renderSortManager(); }
        } else { alert("오류"); i.value = ""; }
    }

    async function generateReport(name) {
        const res = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(name)}`);
        const uS = await res.json();
        const p = Math.floor((uS.length / problems.length) * 100) || 0;
        let html = `<html><head><title>리포트</title><style>body{font-family:sans-serif;padding:40px;}.bar{background:#eee;height:20px;border-radius:10px;overflow:hidden;margin:20px 0;}.fill{background:#28a745;height:100%;width:${p}%;}</style></head><body><h1>${name} 학생 리포트</h1><div class="bar"><div class="fill"></div></div><h3>성취도: ${p}%</h3><ul>`;
        problems.forEach(x => { html += `<li>${uS.includes(x.id)?'●':'○'} ${x.mainCat}>${x.subCat}>${x.title}</li>`; });
        html += `</ul><button onclick='window.print()'>인쇄</button></body></html>`;
        const win = window.open('', '_blank'); win.document.write(html); win.document.close();
    }

    function renderSortManager() {
        const b = document.getElementById('sort-body'); b.innerHTML = "";
        problems.forEach((p, i) => { b.innerHTML += `<tr><td><input type='checkbox' class='p-check' data-idx='${i}'></td><td style='color:#777;'>${p.subCat}</td><td style='text-align:left;'>${p.title}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},-1)'>↑</button><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},1)'>↓</button></td></tr>`; });
    }
    function renderCatManager() {
        const b = document.getElementById('cat-sort-body'); b.innerHTML = "";
        const cats = [...new Set(problems.map(p => p.subCat))];
        cats.forEach((c, i) => { b.innerHTML += `<tr><td style='text-align:left; font-weight:bold;'>${c}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${c}",-1)'>▲ 위로</button><button class='btn-mini' style='background:#007acc;' onclick='moveCategory("${c}",1)'>▼ 아래로</button></td></tr>`; });
    }
    function moveProb(idx, dir) { let t = idx + dir; if (t < 0 || t >= problems.length) return; let tmp = problems[idx]; problems[idx] = problems[t]; problems[t] = tmp; updateAll(); }
    function moveCategory(name, dir) { 
        const cats = [...new Set(problems.map(p => p.subCat))]; const cur = cats.indexOf(name); const tar = cur + dir;
        if(tar < 0 || tar >= cats.length) return;
        cats.splice(cur, 1); cats.splice(tar, 0, name);
        let nO = []; cats.forEach(s => { nO = [...nO, ...problems.filter(p => p.subCat === s)]; });
        problems = nO; updateAll(); renderCatManager();
    }
    function toggleAllChecks() { const cs = document.querySelectorAll('.p-check'); const all = Array.from(cs).every(c => c.checked); cs.forEach(c => c.checked = !all); }
    function deleteSelected() { const cs = document.querySelectorAll('.p-check:checked'); if(!confirm("삭제?")) return; const ids = Array.from(cs).map(c => parseInt(c.dataset.idx)).sort((a,b)=>b-a); ids.forEach(i => problems.splice(i, 1)); updateAll(); }
    function resetDataAndSync() { if(confirm("초기화?")) { localStorage.removeItem('coden_probs_v81'); location.reload(); } }
    function updateAll() { localStorage.setItem('coden_probs_v81', JSON.stringify(problems)); renderSortManager(); renderList(); }
    function applyTestJson() { try { const d = JSON.parse(document.getElementById('test-json-input').value); problems = [...d.map((p,i)=>({id:99000+i,...p})), ...problems]; renderList(); alert("테스트 적용됨"); closePanels(); } catch(e){alert("JSON 오류");} }
    function exportJson() { document.getElementById('json-io').value = JSON.stringify(problems.map(({id, ...rest})=>rest), null, 2); alert("복사됨"); }
    async function showStats() {
        const body = document.getElementById('stats-body'); body.innerHTML = "로드 중...";
        try {
            const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
            const data = await res.json();
            const stats = {}; data.forEach(row => { if(!stats[row[1]]) stats[row[1]] = new Set(); stats[row[1]].add(row[2]); });
            body.innerHTML = "";
            Object.keys(stats).forEach(n => { const cnt = stats[n].size; body.innerHTML += `<tr><td>${n}</td><td>${Math.floor((cnt/problems.length)*100)}%</td><td>${cnt}개</td><td><button class='btn-mini' style='background:#007acc;' onclick="generateReport('${n}')">📄</button></td></tr>`; });
        } catch(e) { body.innerHTML = "데이터 없음"; }
    }
    function switchAdminTab(t) { 
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        if(t==='prob') { document.getElementById('tab-prob').classList.add('active'); document.getElementById('admin-prob-view').style.display='block'; document.getElementById('admin-cat-view').style.display='none'; renderSortManager(); }
        else { document.getElementById('tab-cat').classList.add('active'); document.getElementById('admin-prob-view').style.display='none'; document.getElementById('admin-cat-view').style.display='block'; renderCatManager(); }
    }
    function login() { const n = document.getElementById('user-name').value.trim(); if(n) { localStorage.setItem('coden_user_v81', n); location.reload(); } }
    function logout() { localStorage.removeItem('coden_user_v81'); location.reload(); }
    function closePanels() { document.querySelectorAll('.floating-panel, .custom-modal').forEach(p=>p.style.display='none'); }

    initApp();
</script>
</body>
</html>
