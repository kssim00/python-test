<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코드:앤 파이썬 스튜디오 (v7.6)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --vscode-bg: #1e1e1e; --vscode-side: #252526; --vscode-accent: #007acc; --vscode-text: #cccccc; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--vscode-bg); color: var(--vscode-text); font-family: 'Pretendard', sans-serif; }
        .app-wrapper { display: none; height: 100vh; width: 100vw; overflow: hidden; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e1e1e; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--vscode-accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #pw-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .pw-box { background: #252526; padding: 30px; border-radius: 12px; border: 1px solid #444; width: 300px; text-align: center; }

        .activity-bar { width: 50px; background: #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; justify-content: space-between; flex-shrink: 0; }
        .explorer { width: 250px; background: var(--vscode-side); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        
        /* 레이아웃 메인 박스 */
        .main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* [기능] 가로 조절 가능 패널 */
        .description-panel { width: 400px; min-width: 200px; padding: 25px; border-right: 1px solid #333; background: #1e1e1e; overflow-y: auto; flex-shrink: 0; box-sizing: border-box; }
        
        /* [기능] 가로 리사이저 바 */
        .resizer-h { width: 5px; cursor: col-resize; background: #333; transition: 0.2s; z-index: 5; }
        .resizer-h:hover { background: var(--vscode-accent); }

        .editor-section { flex: 1; display: flex; flex-direction: column; min-width: 300px; position: relative; overflow: hidden; }
        
        /* 에디터 영역 */
        #editor-container { flex: 1; width: 100%; min-height: 100px; }

        /* [기능] 세로 리사이저 바 */
        .resizer-v { height: 5px; cursor: row-resize; background: #333; transition: 0.2s; z-index: 5; }
        .resizer-v:hover { background: var(--vscode-accent); }

        /* 터미널 영역 */
        .console-area { height: 200px; min-height: 50px; background: #000; padding: 8px 15px; border-top: 1px solid #333; overflow-y: auto; flex-shrink: 0; box-sizing: border-box; }
        #output { color: #00ff00; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 14px; line-height: 1.3; margin-top: 5px; }
        
        .btn-run { position: absolute; right: 25px; top: 15px; z-index: 10; background: #28a745; color: white; border: none; padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        .desc-section-title { font-weight: bold; color: #fff; margin: 25px 0 10px 0; font-size: 16px; border-left: 5px solid var(--vscode-accent); padding-left: 12px; }
        .desc-text { line-height: 1.8; color: #ccc; font-size: 14.5px; margin-bottom: 10px; }
        .example-box { background: #2d2d2d; border-radius: 8px; padding: 15px; border: 1px solid #444; color: #eee; font-family: 'Courier New', monospace; margin: 10px 0; }
        .example-label { color: #888; font-size: 11px; margin-bottom: 5px; font-family: 'Pretendard'; }
        
        .main-cat-header { padding: 12px 15px; font-size: 12px; font-weight: bold; color: #fff; background: #37373d; cursor: pointer; border-bottom: 1px solid #222; }
        .sub-cat-header { padding: 10px 15px 10px 30px; font-size: 12px; color: #999; background: #2d2d2d; cursor: pointer; border-bottom: 1px solid #222; }
        .prob-item { padding: 8px 15px 8px 50px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #282828; }
        .prob-item.active { background: #37373d; color: white; border-left: 3px solid var(--vscode-accent); }
        .prob-item.solved { color: #28a745; font-weight: bold; }

        .floating-panel { display: none; position: fixed; top: 30px; left: 65px; right: 35px; bottom: 35px; background: #252526; border: 1px solid #444; border-radius: 12px; z-index: 1000; padding: 25px; overflow-y: auto; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .master-table { width: 100%; border-collapse: collapse; color: #ddd; font-size: 12px; }
        .master-table th, .master-table td { padding: 8px; border: 1px solid #444; text-align: center; }
        .admin-input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

<div id="loader" class="overlay"><div class="spinner"></div><b id="loader-msg">데이터 연동 중...</b></div>

<div id="pw-modal">
    <div class="pw-box">
        <h3 style="color:white; margin-top:0;">관리자 인증</h3>
        <input type="password" id="pw-input" class="admin-input" style="text-align:center; font-size:20px; letter-spacing: 5px;" onkeypress="if(event.keyCode==13) checkPw()">
    </div>
</div>

<div id="login-screen" class="overlay" style="display:none;">
    <div style="background:#252526; padding:40px; border-radius:15px; width:300px; text-align:center; border:1px solid #444;">
        <h2 style="color:white; margin-bottom:20px;">코드:앤 파이썬 스튜디오</h2>
        <input type="text" id="user-name" class="admin-input" style="text-align:center;" placeholder="학생 이름 입력" onkeypress="if(event.keyCode==13) login()">
        <button onclick="login()" style="width:100%; background:#007acc; color:white; border:none; padding:12px; cursor:pointer; font-weight:bold; border-radius:4px; margin-top:15px;">학습 시작</button>
    </div>
</div>

<div class="app-wrapper" id="main-app">
    <div class="activity-bar">
        <div style="text-align: center;"><i class="fas fa-code" style="color:white; font-size: 22px; margin-bottom: 25px;"></i><div id="user-display" style="font-size: 10px; color: #28a745; font-weight: bold; writing-mode: vertical-lr;">USER</div></div>
        <div>
            <div id="sync-icon" title="클라우드 동기화"><i class="fas fa-sync-alt" style="color:#28a745; margin-bottom: 25px;"></i></div>
            <div onclick="askPw('dashboard')" title="성취도"><i class="fas fa-chart-line" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="askPw('setting')" title="문제 관리 마스터"><i class="fas fa-tasks" style="color:#888; margin-bottom: 25px; cursor:pointer;"></i></div>
            <div onclick="logout()" title="로그아웃"><i class="fas fa-sign-out-alt" style="color:#555; cursor:pointer;"></i></div>
        </div>
    </div>
    <div class="explorer">
        <div style="padding: 15px 20px; font-size: 11px; color: #888; font-weight: bold;">EXPLORER</div>
        <div id="accordion-root" style="flex: 1; overflow-y: auto;"></div>
        <div id="progress-stats" style="padding: 15px 20px; font-size: 12px; color: #28a745; border-top: 1px solid #333; font-weight:bold;">성취도: 0%</div>
    </div>
    
    <div class="main-content" id="resize-container">
        <!-- 1. 문제 지문 패널 -->
        <div class="description-panel" id="panel-desc">
            <h2 id="prob-title" style="margin: 0 0 20px 0; color: white;">문제를 선택하세요</h2>
            <div id="prob-desc-container"></div>
            <button id="hint-btn" style="background:#6e40aa; color:white; border:none; padding:8px 15px; border-radius:4px; font-size:12px; cursor:pointer; margin-top:25px; display:none;" onclick="showHint()"><i class="fas fa-lightbulb"></i> 💡 힌트 보기</button>
        </div>

        <!-- 가로 리사이저 -->
        <div class="resizer-h" id="resizer-h"></div>

        <div class="editor-section">
            <button id="run-btn" class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
            
            <!-- 2. 에디터 영역 -->
            <div id="editor-container"></div>
            
            <!-- 세로 리사이저 -->
            <div class="resizer-v" id="resizer-v"></div>

            <!-- 3. 터미널 영역 -->
            <div class="console-area" id="panel-terminal">
                <div style="color: #666; font-size: 10px; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 3px;">TERMINAL</div>
                <div id="output">코드를 실행하세요.</div>
            </div>
        </div>
    </div>
</div>

<!-- 관리자 패널 (JSON 테스트 기능 추가) -->
<div id="admin-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h2>문제 관리 및 테스트</h2><button onclick="closePanels()">닫기</button></div>
    
    <div class="admin-section">
        <b style="color:#ffcc00;"><i class="fas fa-vial"></i> JSON 코드 직접 테스트 (업로드 전 확인용)</b>
        <p style="font-size:11px; color:#888; margin-top:5px;">깃허브에 올릴 JSON 코드를 아래에 붙여넣고 [테스트 적용]을 누르면 목록에 즉시 추가됩니다.</p>
        <textarea id="test-json-input" class="admin-input" style="height:100px; font-family:monospace;" placeholder='[{"mainCat":"테스트", "subCat":"1차", "title":"샘플", "desc":"내용...", "expected":"10", "initial":"print(10)"}]'></textarea>
        <button onclick="applyTestJson()" style="width:100%; background:#28a745; color:white; border:none; padding:10px; cursor:pointer; font-weight:bold; border-radius:4px;">화면에 테스트 적용</button>
    </div>

    <div class="admin-section">
        <b style="color:var(--vscode-accent);">↕️ 문제 순서 및 삭제</b>
        <div style="max-height:200px; overflow-y:auto; background:#111; padding:10px; margin-top:10px;"><table class="master-table"><thead><tr><th>분류</th><th>제목</th><th>이동</th></tr></thead><tbody id="sort-body"></tbody></table></div>
    </div>
    <button onclick="exportJson()" style="width:100%; background:#444; color:white; border:none; padding:10px; cursor:pointer;">전체 데이터 JSON 복사</button>
</div>

<div id="dashboard-panel" class="floating-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>학생 성취도 대시보드</h3><button onclick="closePanels()">닫기</button></div>
    <table class="master-table"><thead><tr style="background:#333;"><th>이름</th><th>성취도(%)</th><th>푼 문제</th></tr></thead><tbody id="stats-body"></tbody></table>
</div>

<script>
    const GITHUB_USER = "kssim00";
    const GITHUB_REPO = "python-test";
    const MASTER_CLOUD_URL = "https://script.google.com/macros/s/AKfycbxECzN-NGJWsrx466aoGcodQICqQY2UeNVBJ4_CR8gyxi2TerpznaZAX7xCLw530Yk1/exec";
    const ADMIN_PW = "1234";

    let problems = [], solvedIds = [], currentIdx = -1;
    let currentUser = localStorage.getItem('coden_user_v76') || ""; 
    let openMainCats = [], openSubCats = [], targetMode = "";
    let pyodide, editor;

    function smartFormat(text) {
        if (!text) return "";
        let html = "", isExample = false;
        text.split('\n').forEach(line => {
            let t = line.trim(); if (!t) return;
            if (t.startsWith('□') || /^(문제 설명|매개변수 설명|return 값 설명|예제|예시 설명)/.test(t)) {
                isExample = t.includes('예제');
                html += `<div class="desc-section-title">${t.replace('□','').trim()}</div>`;
            } else if (isExample) {
                html += `<div class="example-box"><div class="example-label">출력 결과</div>${t}</div>`;
            } else { html += `<div class="desc-text">${t}</div>`; }
        });
        return html;
    }

    async function initApp() {
        if(!currentUser) { document.getElementById('loader').style.display='none'; document.getElementById('login-screen').style.display='flex'; return; }
        try {
            const githubFilesRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
            const files = await githubFilesRes.json();
            const jsonUrls = files.filter(f => f.name.endsWith('.json')).map(f => f.download_url);
            
            let githubCombined = [];
            for(let url of jsonUrls) {
                const res = await fetch(url);
                githubCombined = [...githubCombined, ...(await res.json())];
            }

            const sheetRes = await fetch(`${MASTER_CLOUD_URL}?action=getProblems`);
            const sheetData = await sheetRes.json();
            problems = [...sheetData, ...githubCombined].map((p, i) => ({ id: 80000 + i, ...p }));

            const sRes = await fetch(`${MASTER_CLOUD_URL}?action=getSolved&name=${encodeURIComponent(currentUser)}`);
            solvedIds = (await sRes.json()).map(id => parseInt(id));

            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
            require(['vs/editor/editor.main'], async function() {
                editor = monaco.editor.create(document.getElementById('editor-container'), { value: "", language: 'python', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }});
                pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/" });
                document.getElementById('loader').style.display = 'none'; document.getElementById('main-app').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                renderList();
                initResizers(); // 리사이저 초기화
            });
        } catch(e) { alert("연결 실패!"); }
    }

    // [기능] 리사이저 로직
    function initResizers() {
        const resizerH = document.getElementById('resizer-h');
        const resizerV = document.getElementById('resizer-v');
        const panelDesc = document.getElementById('panel-desc');
        const panelTerminal = document.getElementById('panel-terminal');

        // 가로 조절 (지문창)
        resizerH.addEventListener('mousedown', (e) => {
            document.onmousemove = (e) => {
                let newWidth = e.clientX - 50; // 사이드바 너비 제외
                if (newWidth > 200 && newWidth < window.innerWidth - 400) {
                    panelDesc.style.width = newWidth + "px";
                    editor.layout();
                }
            };
            document.onmouseup = () => { document.onmousemove = null; };
        });

        // 세로 조절 (터미널)
        resizerV.addEventListener('mousedown', (e) => {
            document.onmousemove = (e) => {
                let newHeight = window.innerHeight - e.clientY;
                if (newHeight > 50 && newHeight < window.innerHeight - 200) {
                    panelTerminal.style.height = newHeight + "px";
                    editor.layout();
                }
            };
            document.onmouseup = () => { document.onmousemove = null; };
        });
    }

    // [기능] JSON 테스트 적용
    function applyTestJson() {
        const input = document.getElementById('test-json-input').value.trim();
        try {
            const newData = JSON.parse(input);
            const startId = problems.length + 90000;
            const formatted = newData.map((p, i) => ({ id: startId + i, ...p }));
            problems = [...formatted, ...problems]; // 맨 앞에 추가
            renderList();
            alert("테스트 문제가 목록 최상단에 추가되었습니다! 새로고침 전까지 유지됩니다.");
            closePanels();
        } catch(e) { alert("JSON 형식이 올바르지 않습니다."); }
    }

    function renderList() {
        const root = document.getElementById('accordion-root'); root.innerHTML = "";
        const tree = {};
        problems.forEach(p => { if(!tree[p.mainCat]) tree[p.mainCat] = {}; if(!tree[p.mainCat][p.subCat]) tree[p.mainCat][p.subCat] = []; tree[p.mainCat][p.subCat].push(p); });
        for(const m in tree) {
            let mDiv = document.createElement('div'); mDiv.className=`main-cat-header`; mDiv.innerText=m;
            mDiv.onclick=()=>{ openMainCats.includes(m)?openMainCats=openMainCats.filter(x=>x!=m):openMainCats.push(m); renderList(); };
            root.appendChild(mDiv);
            if(openMainCats.includes(m)) {
                for(const s in tree[m]) {
                    let sDiv = document.createElement('div'); sDiv.className=`sub-cat-header`; sDiv.innerText=s;
                    sDiv.onclick=()=>{ openSubCats.includes(s)?openSubCats=openSubCats.filter(x=>x!=s):openSubCats.push(s); renderList(); };
                    root.appendChild(sDiv);
                    if(openSubCats.includes(s)) {
                        tree[m][s].forEach(p => {
                            let pDiv = document.createElement('div'); pDiv.className=`prob-item ${currentIdx==p.id?'active':''} ${solvedIds.includes(p.id)?'solved':''}`;
                            pDiv.innerText = (solvedIds.includes(p.id)?'✔ ':'') + p.title;
                            pDiv.onclick=()=>loadProblem(p.id); root.appendChild(pDiv);
                        });
                    }
                }
            }
        }
        document.getElementById('progress-stats').innerText = `성취도: ${problems.length?Math.floor((solvedIds.length/problems.length)*100):0}% (${solvedIds.length}/${problems.length})`;
    }

    function loadProblem(id) {
        const p = problems.find(x => x.id === id); if(!p) return;
        currentIdx = id; renderList();
        document.getElementById('output').innerText = "코드를 실행하세요.";
        document.getElementById('prob-title').innerText = p.title;
        document.getElementById('prob-desc-container').innerHTML = smartFormat(p.desc);
        document.getElementById('hint-btn').style.display = (p.hint && p.hint.trim() !== "") ? 'block' : 'none';
        editor.setValue(localStorage.getItem(`draft_${currentUser}_${id}`) || p.initial || "");
    }

    async function runCode() {
        const p = problems.find(x => x.id === currentIdx);
        try {
            await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
            await pyodide.runPythonAsync(editor.getValue());
            const res = pyodide.runPython("sys.stdout.getvalue()").trim();
            if(res === p.expected.toString().trim()) {
                document.getElementById('output').innerHTML = res + "\n\n<b style='color: yellow;'>🎉 정답입니다! 잘했어요!</b>";
                fetch(`${MASTER_CLOUD_URL}?action=save&name=${encodeURIComponent(currentUser)}&id=${p.id}`);
                if(!solvedIds.includes(p.id)) { solvedIds.push(p.id); renderList(); }
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else { document.getElementById('output').innerHTML = res + `\n\n<span style='color:#ff4d4d;'>❌ 오답 (결과 다름)</span>`; }
        } catch(e) { document.getElementById('output').innerText = "에러: " + e.message.split('at pyodide')[0]; }
    }

    function askPw(mode) { targetMode = mode; document.getElementById('pw-modal').style.display='flex'; document.getElementById('pw-input').focus(); }
    function checkPw() { const i = document.getElementById('pw-input'); if(i.value === ADMIN_PW) { i.value=""; document.getElementById('pw-modal').style.display='none'; if(targetMode == 'dashboard') { document.getElementById('dashboard-panel').style.display='block'; showStats(); } else { document.getElementById('admin-panel').style.display='block'; renderSortManager(); } } else { alert("오류"); i.value=""; } }
    async function showStats() {
        const body = document.getElementById('stats-body'); body.innerHTML = "로드 중...";
        try {
            const res = await fetch(`${MASTER_CLOUD_URL}?action=stats`);
            const data = await res.json();
            const stats = {};
            data.forEach(row => { if(!stats[row[1]]) stats[row[1]] = new Set(); stats[row[1]].add(row[2]); });
            body.innerHTML = "";
            Object.keys(stats).forEach(n => { const cnt = stats[n].size; body.innerHTML += `<tr><td>${n}</td><td>${Math.floor((cnt/problems.length)*100)}%</td><td>${cnt}개</td></tr>`; });
        } catch(e) { body.innerHTML = "데이터 없음"; }
    }
    function renderSortManager() {
        const body = document.getElementById('sort-body'); body.innerHTML = "";
        problems.forEach((p, i) => { body.innerHTML += `<tr><td>${p.subCat}</td><td style='text-align:left;'>${p.title}</td><td><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},-1)'>▲</button><button class='btn-mini' style='background:#007acc;' onclick='moveProb(${i},1)'>▼</button></td></tr>`; });
    }
    function moveProb(idx, dir) { let target = idx + dir; if (target < 0 || target >= problems.length) return; let temp = problems[idx]; problems[idx] = problems[target]; problems[target] = temp; renderSortManager(); renderList(); }
    function exportJson() { document.getElementById('json-io').value = JSON.stringify(problems.map(({id, ...rest})=>rest), null, 2); alert("복사됨"); }
    function login() { const n = document.getElementById('user-name').value.trim(); if(n) { localStorage.setItem('coden_user_v76', n); location.reload(); } }
    function logout() { localStorage.removeItem('coden_user_v76'); location.reload(); }
    function closePanels() { document.querySelectorAll('.floating-panel').forEach(p=>p.style.display='none'); }
    function showHint() { alert("💡 힌트: " + problems.find(p => p.id === currentIdx).hint); }

    initApp();
</script>
</body>
</html>
